{% extends "base.html" %}
{% block page_title %}Editar documento institucional{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{{ url_for('institucional') }}" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Voltar</a>
    <h2><i class="fas fa-building"></i> Editar documento institucional</h2>
</div>
<div class="card"><div class="card-body">
<form method="POST" enctype="multipart/form-data">
    <div class="form-group"><label>Categoria *</label><select name="category" class="form-select" required>
        <option value="institucional" {% if doc.category=='institucional' %}selected{% endif %}>Institucional geral</option>
        <option value="ppsp" {% if doc.category=='ppsp' %}selected{% endif %}>PPSP</option>
        <option value="contrato" {% if doc.category=='contrato' %}selected{% endif %}>Contrato</option>
        <option value="alvara" {% if doc.category=='alvara' %}selected{% endif %}>Alvará</option>
        <option value="certificacao" {% if doc.category=='certificacao' %}selected{% endif %}>Certificação</option>
        <option value="representante_legal" {% if doc.category=='representante_legal' %}selected{% endif %}>Representante legal</option>
        <option value="especialista" {% if doc.category=='especialista' %}selected{% endif %}>Especialista</option>
        <option value="aparelho" {% if doc.category=='aparelho' %}selected{% endif %}>Aparelho</option>
    </select></div>
    <div class="form-group"><label>Título *</label><input type="text" name="title" class="form-input" value="{{ doc.title }}" required></div>
    <div class="form-group"><label>Descrição</label><input type="text" name="description" class="form-input" value="{{ doc.description or '' }}"></div>
    <div class="form-group"><label>Substituir arquivo</label><input type="file" name="file" class="form-input" accept=".pdf,.doc,.docx"></div>
    <p class="text-muted">Arquivo atual: <a href="{{ url_for('serve_document', filename=doc.filename) }}" target="_blank" rel="noopener">{{ doc.original_filename }}</a></p>
    <div class="form-actions" style="margin-top:1.5rem;display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
        <a href="{{ url_for('institucional') }}" class="btn btn-outline">Cancelar</a>
    </div>
</form>
</div></div>
{% endblock %}
