{% extends "base.html" %}
{% block page_title %}Editar relatório{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{{ url_for('relatorios') }}" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Voltar</a>
    <h2><i class="fas fa-file-alt"></i> Editar relatório</h2>
</div>
<div class="card"><div class="card-body">
<form method="POST">
    <div class="form-group"><label>Título *</label><input type="text" name="titulo" class="form-input" value="{{ relatorio.titulo }}" required></div>
    <div class="form-group"><label>Descrição</label><input type="text" name="descricao" class="form-input" value="{{ relatorio.descricao or '' }}"></div>
    <div class="form-group"><label>Categoria</label><input type="text" name="categoria" class="form-input" value="{{ relatorio.categoria or 'geral' }}"></div>
    <p class="text-muted">Arquivo PDF atual: <a href="{{ url_for('serve_document', filename=relatorio.filename) }}" target="_blank" rel="noopener">{{ relatorio.original_filename }}</a></p>
    <div class="form-actions" style="margin-top:1.5rem;display:flex;gap:12px;"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button><a href="{{ url_for('relatorios') }}" class="btn btn-outline">Cancelar</a></div>
</form>
</div></div>
{% endblock %}
