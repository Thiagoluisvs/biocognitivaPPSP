{% extends "base.html" %}
{% block page_title %}{% if course %}Editar Curso{% else %}Novo Curso{% endif %}{% endblock %}
{% block content %}
<div class="card"><div class="card-header"><h2><i class="fas fa-plus-circle"></i> {% if course %}Editar{% else %}Criar{% endif %} Curso</h2></div>
<div class="card-body">
<form method="POST">
    <div class="form-group"><label>Título</label><input type="text" name="title" class="form-input" value="{{ course.title if course else '' }}" required></div>
    <div class="form-group"><label>Descrição</label><textarea name="description" class="form-textarea" rows="4" required>{{ course.description if course else '' }}</textarea></div>
    <div class="grid-3">
        <div class="form-group"><label>Categoria</label><input type="text" name="category" class="form-input" value="{{ course.category if course else 'Toxicologia' }}"></div>
        <div class="form-group"><label>Dificuldade</label><select name="difficulty" class="form-select"><option value="iniciante">Iniciante</option><option value="intermediario" selected>Intermediário</option><option value="avancado">Avançado</option></select></div>
        <div class="form-group"><label>Duração (horas)</label><input type="number" name="duration_hours" class="form-input" value="{{ course.duration_hours if course else 0 }}" step="0.5"></div>
    </div>
    <div class="grid-2">
        <div class="form-group"><label>Máx. Alunos</label><input type="number" name="max_students" class="form-input" value="{{ course.max_students if course else 50 }}"></div>
        <div class="form-group"><label>Preço (R$)</label><input type="number" name="price" class="form-input" value="{{ course.price if course else 0 }}" step="0.01"></div>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
</form></div></div>
{% endblock %}
